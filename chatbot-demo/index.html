<!DOCTYPE htlm>
<html lang="en">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Chatbot Demo</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
	    body { font-family: 'Segoe Ui', sans-serif; background: #fof2f5; height: 100vh ; display: flex; align-item: center: justify-content: center; }

	    .chat-header { background: #007bff; color: white; padding: 16px 20px; display: flex; align-item: center; gap: 12px; }
	    .chat-header .avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-item: center; justify-content: center; font-size 18px;}
	    .chat-header .info h3 { font-size: 14px; font-weight: 600; }
	    .chat-header .info span { font-size: 11px; opacity; 0.8; }

	    .chat-message {flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
	    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
	    .msg.user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
	    .msg.bot { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
	    .msg.bot b { font-weight 600; }

	    .typing-indicator { algin-self: flex-start; padding: 10px 14px; background: #f0f0f0; border-radius: 16px; display: flex; gap: 4px; }
	    .typing-indicator span { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite; }
	    .typing-indicator span:nth-child(2) { animation-delay: 0.2; }
	    .typing-indicator span:nth-child(3) {animation-delay: 0.4; }
	    @keyframes bounces { 0%,60%,100% { transform: transelateY(0); } 30% { transform: transelateY(-4px); } }

	    .chat-input { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
	    .chat-input input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
	    .chat-input input:focus { border-color: #007bff; }
	    .chat-input button { width: 38px; height: 38px; background: #007bff; color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 16px; }
	    .chat-input button:hover { background: #0056b3; }
